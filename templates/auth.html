<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FinanceIQ — Login</title>
  <style>
    /* ── Variables ───────────────────────────────────────── */
    :root {
      --bg:      #f4f6fb;
      --surface: #ffffff;
      --border:  #e2e8f0;
      --text:    #1a202c;
      --muted:   #718096;
      --primary: #6c63ff;
      --primary-hover: #574fd6;
      --danger:  #e53e3e;
      --success: #38a169;
      --radius:  14px;
      --shadow:  0 8px 32px rgba(108,99,255,0.10);
    }
    [data-theme="dark"] {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --border:  #2d3148;
      --text:    #e2e8f0;
      --muted:   #a0aec0;
    }

    /* ── Reset ───────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    /* ── Layout ──────────────────────────────────────────── */
    .auth-wrapper {
      display: flex;
      width: 100%;
      max-width: 900px;
      min-height: 540px;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      margin: 24px;
    }

    /* ── Left Panel ──────────────────────────────────────── */
    .auth-left {
      flex: 1;
      background: linear-gradient(135deg, #6c63ff 0%, #4834d4 100%);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      color: #fff;
    }
    .auth-left .logo { font-size: 1.8rem; font-weight: 800; margin-bottom: 16px; }
    .auth-left .tagline { font-size: 1.1rem; opacity: 0.85; line-height: 1.6; margin-bottom: 32px; }
    .features { display: flex; flex-direction: column; gap: 14px; }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.92rem;
      opacity: 0.9;
    }
    .feature-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem;
    }

    /* ── Right Panel ─────────────────────────────────────── */
    .auth-right {
      flex: 1;
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* ── Tabs ────────────────────────────────────────────── */
    .tabs {
      display: flex;
      gap: 0;
      margin-bottom: 32px;
      border-bottom: 2px solid var(--border);
    }
    .tab-btn {
      flex: 1;
      padding: 12px;
      background: none;
      border: none;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all 0.2s;
    }
    .tab-btn.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    /* ── Forms ───────────────────────────────────────────── */
    .form { display: none; flex-direction: column; gap: 16px; }
    .form.active { display: flex; }

    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input {
      padding: 11px 14px;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.92rem;
      outline: none;
      transition: border 0.2s;
    }
    .form-input:focus { border-color: var(--primary); }

    .btn-submit {
      padding: 12px;
      border-radius: 8px;
      background: var(--primary);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }
    .btn-submit:hover { background: var(--primary-hover); }

    /* ── Alert ───────────────────────────────────────────── */
    .alert {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
      font-weight: 500;
      display: none;
    }
    .alert.error   { background: #fff0f0; color: var(--danger);  border: 1px solid #fed7d7; display: block; }
    .alert.success { background: #f0fff4; color: var(--success); border: 1px solid #c6f6d5; display: block; }

    /* ── Theme Toggle ────────────────────────────────────── */
    .theme-toggle {
      position: fixed;
      top: 16px; right: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.85rem;
      cursor: pointer;
      color: var(--muted);
    }

    /* ── Responsive ──────────────────────────────────────── */
    @media (max-width: 640px) {
      .auth-left { display: none; }
      .auth-right { padding: 32px 24px; }
    }
  </style>
</head>
<body>

<button class="theme-toggle" onclick="toggleTheme()">🌙 Dark</button>

<div class="auth-wrapper">

  <!-- Left Panel -->
  <div class="auth-left">
    <div class="logo">💰 FinanceIQ</div>
    <div class="tagline">Your smart personal finance tracker. Know where every rupee goes.</div>
    <div class="features">
      <div class="feature-item">
        <div class="feature-icon">📊</div>
        <span>Visual spending analytics</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon">🤖</div>
        <span>AI-powered insights</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon">📋</div>
        <span>Track all your expenses</span>
      </div>
      <div class="feature-item">
        <div class="feature-icon">🌙</div>
        <span>Dark & light mode</span>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="auth-right">

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn"        onclick="switchTab('register')">Register</button>
    </div>

    <!-- Alert -->
    <div class="alert" id="alert"></div>

    <!-- Login Form -->
    <div class="form active" id="form-login">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" class="form-input" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••"/>
      </div>
      <button class="btn-submit" onclick="doLogin()">Login →</button>
    </div>

    <!-- Register Form -->
    <div class="form" id="form-register">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" class="form-input" placeholder="Your name"/>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" class="form-input" placeholder="you@example.com"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="reg-password" class="form-input" placeholder="Min 6 characters"/>
      </div>
      <button class="btn-submit" onclick="doRegister()">Create Account →</button>
    </div>

  </div>
</div>

<script>
  // ── Tab Switch ─────────────────────────────────────────
  function switchTab(tab) {
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('form-login').classList.toggle('active',    tab === 'login');
    document.getElementById('form-register').classList.toggle('active', tab === 'register');
    hideAlert();
  }

  // ── Login ──────────────────────────────────────────────
  async function doLogin() {
    const email    = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    if (!email || !password) { showAlert('Please fill all fields!', 'error'); return; }

    const res  = await fetch('/api/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (res.ok) {
      showAlert('Login successful! Redirecting...', 'success');
      setTimeout(() => window.location.href = '/welcome', 1000);
    } else {
      showAlert(data.error || 'Login failed!', 'error');
    }
  }

  // ── Register ───────────────────────────────────────────
  async function doRegister() {
    const name     = document.getElementById('reg-name').value.trim();
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;

    if (!name || !email || !password) { showAlert('Please fill all fields!', 'error'); return; }
    if (password.length < 6)          { showAlert('Password must be at least 6 characters!', 'error'); return; }

    const res  = await fetch('/api/register', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ name, email, password })
    });
    const data = await res.json();

    if (res.ok) {
      showAlert('Account created! Please login.', 'success');
      setTimeout(() => switchTab('login'), 1500);
    } else {
      showAlert(data.error || 'Registration failed!', 'error');
    }
  }

  // ── Alert ──────────────────────────────────────────────
  function showAlert(msg, type) {
    const el = document.getElementById('alert');
    el.textContent  = msg;
    el.className    = `alert ${type}`;
  }
  function hideAlert() {
    const el = document.getElementById('alert');
    el.className = 'alert';
  }

  // ── Theme ──────────────────────────────────────────────
  function toggleTheme() {
    const html = document.documentElement;
    const dark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', dark ? 'light' : 'dark');
    document.querySelector('.theme-toggle').textContent = dark ? '🌙 Dark' : '☀️ Light';
  }
</script>
</body>
</html>
